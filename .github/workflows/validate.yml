name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Repository validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Sync plugin package
        run: bash scripts/sync-plugin-package.sh

      - name: Repository validation
        run: bash scripts/validate-repo.sh

      - name: Loop fixture validation
        run: bash scripts/validate-loop-contract-fixtures.sh

      - name: Schema validation
        run: python3 scripts/validate-schemas.py

      - name: Documentation validation
        run: python3 scripts/validate-docs.py

      - name: Snapshot protocol validation
        run: python3 scripts/run-snapshots.py
        
      - name: Loop regression tests
        run: python3 scripts/test-loop-runner.py
